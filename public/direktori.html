<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direktori Site</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/tom-select/2.2.2/css/tom-select.bootstrap5.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon">N</div>
                NPD
            </div>

            <div class="menu-section">MENU UTAMA</div>
            <a href="index.html" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            
            
            <div class="menu-section">OPERASIONAL</div>
            <a href="provisioning.html" class="nav-link"><i class="bi bi-tools"></i> Provisioning</a>
            
            <div class="menu-section">ADMINISTRASI</div>
            <a href="direktori.html" class="nav-link active"><i class="bi bi-hdd-network"></i> Link Directory</a>
            <a href="partners.html" class="nav-link"><i class="bi bi-buildings"></i> Partner ISP</a>
            <a href="customers.html" class="nav-link"><i class="bi bi-people"></i> Survey</a>
        </aside>

        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="page-title m-0">Direktori Site</h1>
                <div>
                    <button class="btn-ui-text"><i class="bi bi-download me-1"></i> Import</button>
                    <button class="btn-ui-text me-3"><i class="bi bi-upload me-1"></i> Export</button>
                    <a href="direktori_new.html" class="btn btn-ui-primary shadow-sm text-decoration-none d-inline-flex align-items-center">
                        <i class="bi bi-plus-lg me-2"></i> Add New
                    </a>
                </div>
            </div>

            <div id="filterStatus" class="ui-tabs">
                <div class="ui-tab active">All Sites</div>
                <div class="ui-tab">Online</div>
                <div class="ui-tab">Terminated</div>
            </div>

            <div class="search-sort-row">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchInput" oninput="applySearchAndSort()" placeholder="Search customer, ID, or location..." onkeyup="cariDirektori()">
                </div>
                <div class="d-flex align-items-center gap-2 border rounded-3 px-3 py-2">
                    <span class="text-muted small fw-semibold">Sort By</span>
                    <select id="sortSelect" onchange="applySearchAndSort()" class="border-0 shadow-none fw-bold text-muted bg-transparent" style="cursor: pointer; outline: none; font-size: 13px;">
                        <option value="terbaru">Last update (newest)</option>
                        <option value="az">Alphabetical A-Z</option>
                    </select>
                </div>
            </div>

            <div class="ui-table-container">
                <div class="ui-table-header">
                    <div style="width: 48px;" class="text-muted fw-bold">NO.</div>
                    <div style="flex: 2;">CUSTOMER & LOCATION</div>
                    <div style="flex: 1.5;">SERVICE & SERVICE ID</div>
                    <div style="flex: 1.5;">PARTNER & CIRCUIT ID</div>
                    <div style="flex: 1;">DATE</div>
                    <div style="flex: 0.5; ">STATUS</div>
                    <div style="width: 90px; text-align: right;">ACTION</div>
                </div>

                <div id="siteListBody"></div>
                <div class="d-flex justify-content-between align-items-center px-4 py-3 rounded-bottom mt-2">
                    <div id="dirPaginationInfo" class="badge bg-dark border px-3 py-2 rounded-pill fw-bold shadow-sm" style="font-size: 12px;">
                        Menyiapkan data...
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm bg-dark border rounded-pill px-4 fw-bold text-light shadow-sm d-flex align-items-center" id="btnPrevDir" onclick="changeDirPage(-1)">
                            <i class="bi bi-chevron-left me-2" style="font-size: 12px;"></i> Prev
                        </button>
                        <button class="btn btn-sm bg-dark border rounded-pill px-4 fw-bold text-primary shadow-sm d-flex align-items-center" id="btnNextDir" onclick="changeDirPage(1)">
                            Next <i class="bi bi-chevron-right ms-2" style="font-size: 12px;"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
