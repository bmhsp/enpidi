<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner ISP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body class="d-flex page-bg">

    <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon">N</div>
                NPD
            </div>

            <div class="menu-section">MENU UTAMA</div>
            <a href="index.html" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            
            
            <div class="menu-section">OPERASIONAL</div>
            <a href="provisioning.html" class="nav-link"><i class="bi bi-tools"></i> Provisioning</a>
            
            <div class="menu-section">ADMINISTRASI</div>
            <a href="direktori.html" class="nav-link"><i class="bi bi-hdd-network"></i> Link Directory</a>
            <a href="partners.html" class="nav-link active"><i class="bi bi-buildings"></i> Partner ISP</a>
            <a href="survey.html" class="nav-link"><i class="bi bi-people"></i> Survey</a>
        </aside>

    <div class="flex-grow-1 p-4 p-md-5" style="overflow-y: auto; height: 100vh;">
        
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="fw-bold mb-2">Partners ISP</h2>
            <div>
                <button class="btn-ui-text"><i class="bi bi-download me-1"></i> Import</button>
                <button class="btn-ui-text me-3"><i class="bi bi-upload me-1"></i> Export</button>
                <button class="btn-ui-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#modalAddPartner">
                    <i class="bi bi-plus-lg me-1"></i> New Partner
                </button>
            </div>
        </div>

        <div class="custom-tabs">
            <div class="custom-tab-item active">All</div>
            <div class="custom-tab-item">Active Partners</div>
            <div class="custom-tab-item">Prospect / Negotiation</div>
            <div class="custom-tab-item">Terminated</div>
        </div>

        <div class="toolbar-container">
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="searchPartnerInput" class="form-control" placeholder="Search partners..." oninput="applyPartnerSearchAndSort()">
            </div>
            <div class="sort-box shadow-sm cursor-pointer">
                <div class="sort-label">Sort By</div>
                <select class="border-0 shadow-none fw-bold bg-transparent" style="cursor: pointer; outline: none; font-size: 13px; color: #bbbbbb;" id="sortPartnerSelect" onchange="applyPartnerSearchAndSort()">
                    <option value="az">A-Z (Nama Partner)</option>
                    <option value="pengeluaran_terbesar">Total Pengeluaran Terbesar</option>
                    <option value="site_terbanyak">Total Site Terbanyak</option>
                </select>
            </div>
        </div>

        <div class="ui-table-container mt-4">
            <div class="ui-table-header d-flex align-items-center px-4 py-3 border-bottom text-muted fw-bold" style="font-size: 11px; letter-spacing: 0.5px;">
                <div style="width: 48px;" class="text-muted fw-bold">NO.</div>
                <div style="flex: 2;">NAMA PARTNER</div>
                <div style="flex: 1.5;">ACCOUNT MANAGER</div>
                <div style="flex: 1.5;">TOTAL BIAYA (MRC)</div>
                <div style="flex: 1; padding-right: 15px;" class="fw-bold">LAYANAN UTAMA</div>
                <div style="flex: 0.5;">TOTAL SITE</div>
                <div style="width: 90px; text-align: right;">ACTIONS</div>
            </div>

            <div id="partnerListBody"></div>

            <div class="d-flex justify-content-between align-items-center px-4 py-3 border-top rounded-bottom mt-2">
                <div id="partnerPaginationInfo" class="badge text-secondary border px-3 py-2 rounded-pill fw-bold shadow-sm" style="font-size: 12px;">
                    Menyiapkan data...
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm border rounded-pill px-4 fw-bold text-muted shadow-sm d-flex align-items-center" id="btnPrevPartner" onclick="changePartnerPage(-1)">
                        <i class="bi bi-chevron-left me-2" style="font-size: 12px;"></i> Prev
                    </button>
                    <button class="btn btn-sm border rounded-pill px-4 fw-bold text-primary shadow-sm d-flex align-items-center" id="btnNextPartner" onclick="changePartnerPage(1)">
                        Next <i class="bi bi-chevron-right ms-2" style="font-size: 12px;"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAddPartner" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px;">
                <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold">Add New Partner</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <form id="formAddPartner">
                    <div class="p-4"> 
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">NAMA PARTNER ISP</label>
                            <input type="text" class="form-control py-2" id="inputPartnerName" placeholder="Contoh: PT Telkom Indonesia" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">EMAIL PIC / HELPDESK</label>
                            <input type="email" class="form-control py-2" id="inputPartnerEmail" placeholder="support@partner.com">
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">ACCOUNT MANAGER</label>
                                <input type="text" class="form-control py-2" id="inputPartnerAM" placeholder="Nama AM">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">PHONE NUMBER</label>
                                <input type="text" class="form-control py-2" id="inputPartnerPhone" placeholder="08123xxxx">
                            </div>
                        </div>

                        <div class="col-12 mt-3">
                            <label class="form-label text-muted small fw-bold">ALAMAT KANTOR</label>
                            <textarea class="form-control shadow-none" id="inputPartnerAddress" rows="2" placeholder="Masukkan alamat lengkap kantor partner..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2 pt-3 mt-2 border-top">
                            <button type="button" class="btn btn-light fw-bold px-4" data-bs-dismiss="modal">Batal</button>
                            <button type="submit" class="btn btn-primary fw-bold px-4">Simpan Data</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
