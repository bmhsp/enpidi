<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provisioning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex">

    <aside class="sidebar">
        <div class="brand">
            <div class="logo-icon">N</div>
            NPD
        </div>

        <div class="menu-section">MENU UTAMA</div>
        <a href="index.html" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        
        
        <div class="menu-section">OPERASIONAL</div>
        <a href="provisioning.html" class="nav-link active"><i class="bi bi-tools"></i> Provisioning</a>
        
        <div class="menu-section">ADMINISTRASI</div>
        <a href="direktori.html" class="nav-link"><i class="bi bi-hdd-network"></i> Link Directory</a>
        <a href="partners.html" class="nav-link"><i class="bi bi-buildings"></i> Partner ISP</a>
        <a href="customers.html" class="nav-link"><i class="bi bi-people"></i> Survey</a>
    </aside>

    <div class="container-fluid px-4 pb-5 mt-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center">
                    <button class="btn btn-light rounded-circle shadow-sm me-3" onclick="window.location.href='provisioning.html'">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <div>
                        <h4 class="mb-0 fw-bolder text-dark">Detail Provisioning</h4>
                        <div class="text-muted small mt-1 fw-semibold">Service ID: <span id="detServiceId" class="text-primary">-</span></div>
                    </div>
                </div>
                <button class="btn btn-success rounded-pill px-4 py-2 fw-bold shadow-sm d-flex align-items-center" id="btnDoneTask">
                    <i class="bi bi-check-circle-fill me-2"></i> COMPLETE TASK
                </button>
            </div>

            <div class="row">
                <div class="col-lg-7 mb-4">
                    <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                        <h6 class="fw-bold mb-4 text-dark border-bottom pb-2">Informasi Site & Link</h6>
                        
                        <div class="row mb-3">
                            <div class="col-4 text-muted small fw-bold">CUSTOMER</div>
                            <div class="col-8 fw-bold text-dark" id="detCustomer">-</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-4 text-muted small fw-bold">LOKASI SITE</div>
                            <div class="col-8 fw-semibold text-secondary" id="detSite">-</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-4 text-muted small fw-bold">TIPE PROJECT</div>
                            <div class="col-8"><span class="badge bg-primary-subtle text-primary border border-primary border-opacity-25 rounded-pill px-3" id="detProject">-</span></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-4 text-muted small fw-bold">PARTNER ISP</div>
                            <div class="col-8 fw-bold text-dark" id="detPartner">-</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-4 text-muted small fw-bold">KAPASITAS / LAYANAN</div>
                            <div class="col-8 fw-semibold text-secondary" id="detService">-</div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5 mb-4">
                    <div class="card border-0 shadow-sm rounded-4 p-4 h-100 border border-secondary border-opacity-10">
                        <h6 class="fw-bold mb-4 text-dark"><i class="bi bi-activity text-warning me-2"></i>Update Progress Lapangan</h6>
                        
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">STATUS SAAT INI</label>
                            <textarea class="form-control shadow-none border-0" id="inputProgress" rows="4" placeholder="Misal: Sedang tarik kabel FO di lokasi..."></textarea>
                        </div>
                        
                        <button class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm" id="btnUpdateProgress">
                            <i class="bi bi-cloud-arrow-up me-2"></i> Simpan Progress
                        </button>
                    </div>
                </div>
            </div>

        </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
